<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鸿蒙AI助手</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1 class="header-title">🤖 鸿蒙AI助手</h1>
      <button id="settings-btn" class="icon-btn" title="设置">
        ⚙️
      </button>
    </header>

    <main class="main">
      <div id="chat-container" class="chat-container">
        <div id="welcome-message" class="welcome-message">
          <div class="welcome-icon">💬</div>
          <h2>欢迎使用鸿蒙AI助手</h2>
          <p>连接鸿蒙端侧模型，开始智能对话</p>
          <div class="quick-actions">
            <button class="quick-action-btn" data-prompt="你好，请介绍一下你自己">
              👋 打个招呼
            </button>
            <button class="quick-action-btn" data-prompt="请帮我写一段代码">
              💻 写代码
            </button>
            <button class="quick-action-btn" data-prompt="请帮我翻译一段文字">
              🌐 翻译
            </button>
          </div>
        </div>
        <div id="messages" class="messages"></div>
      </div>
    </main>

    <footer class="footer">
      <div class="input-container">
        <textarea
          id="message-input"
          class="message-input"
          placeholder="输入消息... (Enter发送, Shift+Enter换行)"
          rows="1"
        ></textarea>
        <button id="send-btn" class="send-btn" title="发送">
          ➤
        </button>
      </div>
      <div class="status-bar">
        <span id="connection-status" class="status-indicator">
          <span class="status-dot"></span>
          <span class="status-text">未连接</span>
        </span>
      </div>
    </footer>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
