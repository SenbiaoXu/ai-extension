<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鸿蒙AI助手</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1 class="header-title">🤖 鸿蒙AI助手</h1>
      <div class="header-actions">
        <button id="external-msg-btn" class="icon-btn" title="外部消息">
          📨
          <span id="msg-badge" class="badge hidden">0</span>
        </button>
        <button id="settings-btn" class="icon-btn" title="设置">
          ⚙️
        </button>
      </div>
    </header>

    <main class="main">
      <div id="chat-container" class="chat-container">
        <div id="welcome-message" class="welcome-message">
          <div class="welcome-icon">💬</div>
          <h2>欢迎使用鸿蒙AI助手</h2>
          <p>连接鸿蒙端侧模型，开始智能对话</p>
          <div class="quick-actions">
            <button class="quick-action-btn" data-prompt="你好，请介绍一下你自己">
              👋 打个招呼
            </button>
            <button class="quick-action-btn" data-prompt="北京今天天气怎么样？" data-tools='[{"type":"function","function":{"name":"get_weather","description":"获取指定城市的天气信息","parameters":{"type":"object","properties":{"city":{"type":"string","description":"城市名称"}},"required":["city"]}}}]'>
              🔧 调用工具
            </button>
          </div>
        </div>
        <div id="messages" class="messages"></div>
      </div>

      <div id="external-msg-panel" class="external-msg-panel hidden">
        <div class="panel-header">
          <h3>📨 外部消息</h3>
          <button id="close-panel-btn" class="icon-btn" title="关闭">✕</button>
        </div>
        <div id="external-msg-list" class="external-msg-list">
          <div class="empty-state">暂无外部消息</div>
        </div>
      </div>
    </main>

    <footer class="footer">
      <div class="input-container">
        <textarea
          id="message-input"
          class="message-input"
          placeholder="输入消息... (Enter发送, Shift+Enter换行)"
          rows="1"
        ></textarea>
        <button id="send-btn" class="send-btn" title="发送">
          ➤
        </button>
      </div>
      <div class="status-bar">
        <span id="connection-status" class="status-indicator">
          <span class="status-dot"></span>
          <span class="status-text">未连接</span>
        </span>
      </div>
    </footer>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
